# Reward-shift validation — Proposition 4 fix in the loss-budget (A1) environment.
#
# Proposition 4 states that in a loss-budget environment (r_b < 0 uniformly),
# TCL-SAC exhibits a sup-sup reward inversion above β > β★, causing the policy
# to prefer infeasible states. The minimal fix is a reward shift:
#   r' = r_b + C,   C > max|r_b| = budget = 100 (per step)
# which makes r' > 0 uniformly and restores the intended ordering
#   sup_F r_TCL > sup_I r_TCL  for all β.
#
# This experiment validates the fix by running TCL-SAC with C = 150 on the
# same A1 environment that produced CSR_c0 = 0.372 ± 0.059 under fixed β = 10
# (Table 4, §7.1.5 in the paper).
#
# Expected outcome: CSR_c0 ≈ 1.000 (inversion eliminated), at the cost of a
# higher raw episode return (the shifted reward inflates absolute Q-values but
# does not alter the relative ordering of policies in the feasible region).
#
# Baseline for comparison (from config.phase5_a1.yaml, no reward_shift):
#   TCL fixed β=10:  CSR_c0 = 0.372 ± 0.059,  Return = -2445 ± 99
#
# Only TCL is run here; lag_multi / fixed / hprs results are inherited from A1.
# Those agents are unaffected by reward_shift (which only enters sac_tcl.py).

env:
  env_kind: laplacian
  num_keywords: 100
  budget: 100.0
  bid_max: 3.0
  max_days: 60
  target_utilization: 0.80
  target_ctr: 0.15
  target_margin: -4.0
  margin_formula: revenue_share
  drift_rate: 0.03

sac:
  total_timesteps: 60000
  learning_starts: 1000
  buffer_size: 200000
  batch_size: 256
  gamma: 0.99
  tau: 0.005
  policy_lr: 3.0e-4
  q_lr: 3.0e-4
  policy_frequency: 2
  target_network_frequency: 1
  autotune_alpha: true
  alpha_init: 0.2
  cuda: false

agents:
  tcl:
    thresholds: "0.0,0.0,0.0"
    betas_init: "10.0,10.0,10.0"
    betas_final: ""
    beta_schedule: "linear"
    beta_anneal_steps: 0
    reward_shift: 150.0    # C = 150 > budget = 100 = max|r_b| per step

seeds: [1, 2, 3]
output_dir: runs/phase5_reward_shift
