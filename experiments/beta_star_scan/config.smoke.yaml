# Smoke config: 2000 timesteps, 1 beta, 1 seed. Wiring check only.
env:
  env_kind: laplacian
  num_keywords: 10
  budget: 100.0
  bid_max: 3.0
  max_days: 24
  target_utilization: 0.80
  target_ctr: 0.15
  target_margin: -4.0
  margin_formula: revenue_share
  drift_rate: 0.03

sac:
  total_timesteps: 2000
  learning_starts: 400
  buffer_size: 2000
  batch_size: 64
  gamma: 0.99
  tau: 0.005
  policy_lr: 3.0e-4
  q_lr: 3.0e-4
  policy_frequency: 2
  target_network_frequency: 1
  autotune_alpha: true
  alpha_init: 0.2
  cuda: false

tcl_base:
  thresholds: "0.0,0.0,0.0"
  betas_final: ""
  beta_schedule: "linear"
  beta_anneal_steps: 0
  reward_shift: 0.0

beta_sweep: [5, 10]

seeds: [42]
output_dir: runs/beta_star_scan_smoke
